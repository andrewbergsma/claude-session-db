          - generic [ref=e9502]: "I have what I need. The destructive instruction is **safe on the axis I was worried about, and unsafe on a different one.** ## Blast radius of `DELETE FROM tag_stages` The good news — nothing irreplaceable is in there yet: | Thing that would be destroyed | Rows | |---|---| | `actual_start` / `actual_finish` | **0** | | `tag_updates` (field progress capture) | **0** | | `supersedes_stage_fk` (rework chain) | **0** | | `rework_reason` | **0** | | `qc_checksheet_instances` refs (would *block* the delete) | **0** | | `stage_*_props` cascade victims | 5 (`stage_procurement_props`) | | **`p6_activity_obj_id` + `p6_sync_etag`** | **161** | So there's no captured field progress to lose, and your \"delete rather than progressively update\" instinct is right. Only two real casualties: 5 procurement-props rows, and **161 P6 activity bindings** (all on `run` tags) that would need re-pushing to keep `standards/schedule-integration` intact. ## The problem: \"ALL tag stage assignments\" is ~54k rows wider than what we have to replace them with `tag_stages` is 73,079 rows, and it is **not** mostly cable: | `tags.kind` | stages | tags | |---|---|---| | instrument | 33,803 | 4,580 | | run (cable + heat-trace) | 30,614 | 5,322 | | point_device | 6,651 | 1,578 | | segment (tray) | 2,011 | 382 | The cable slice is ~**19,255** stages on 3,600 tags. The register exercise produced exactly one materialized stage-row set — `earning_rules/cable_stage_rows.csv`, 25,662 rows, **cable only**. I searched; there is no `*_stage_rows.csv` for any other discipline. So `DELETE FROM tag_stages` + reload from `earning_rules/` would delete **~53,800 instrument, point_device, tray, and heat-trace stage rows and replace them with nothing.** That's the contradiction I want you to resolve, not work around. A related snag: the cable predicate itself isn't clean yet. `controltech:task/reclass-cable-tags-to-CABLE-with-service-code-type` is still open, so `class_code='CABLE'` doesn't reliably select cable runs — we'd need to pin the predicate before scoping any delete. ## Rates: you have two shapes, and they want one table There is **no rates table in `nrutt.db` at all** — I checked; nothing matching `rate|estimating|class_rate`. So this is a new table either way (DDL → P-series migration → your approval). The two sources don't have the same shape: - `earning_rules/estimating_class_rates.csv` — 77 rows, long form, keyed `(register, estimating_class, leg, commodity_code)` with one `unit_rate_mh`. Covers equipment (33), instrument (15), lighting (9), tray (8), grounding (5), trench (4), conduit (3). **No cable.** - `cable/cable_types.csv` — 80 rows, wide form, keyed `cable_type_short`, with four rate legs as columns (`pull_mh_lm`, `gland_mh_ea`, `term_mh_ea`, `test_mh_ea`). Since you want rates for *all* estimating classes, I'd melt cable into the long form — `estimating_class = cable_type_short`, `leg ∈ {pull, gland, term, test}` — and land one `public.estimating_class_rates` table of ~397 rows. That's cleaner than bolting four rate columns onto `cable_types` and leaving the other seven registers homeless. (Existing `public.cable_types` already has 80 rows and gained `short_name` + true conductor counts in P235, so it stays as the *spec* table; rates live beside it, not in it.) One flag from prior guidance: rates are earning weights, so where CT owns subcontracted scope I won't zero a rate — I'll carry the sub-equivalent value. ## How I'd sequence it 1. **Pin the cable predicate** — resolve which `tags` rows are cable runs, since the reclass task is open. 2. **`pg_dump` the affected tables** to `data/migrations/backups/` (not `cp nrutt.db` — that file is the 0-byte decoy). 3. **P-series migration**, next version taken from **live `schema_migrations`** by numeric sort (a parallel session can claim your number — that's bitten this project twice): create `public.estimating_class_rates`, plus whatever `cable.csv` columns earn a public home. 4. 