egs.py`'s five hand-written `legs_cable/_equipment/_tray/_lighting/_instrument` functions collapse into one generic loop, and instrument stops being the only leg-grain register. ## `ct_scope` — derived once, written into every register Never blank, always `TRUE`/`FALSE`. Today it's five predicates in three vocabularies: | register | gate today | TRUE | |---|---|---| | cable | `ct_scope == \"True\"` | 3,700 | | lighting | `ct_scope == \"True\"` | 372 | | instrument | `is_ct_scope == \"True\"` | 1,252 | | trench | `scope_flag == \"YES\"` | 42 | | conduit · eht · grounding · equipment · tray | `install_owner == \"Control Tech\"` | — | `tubing_ct_scope` is `yes`×148 **and blank otherwise** — blank standing in for FALSE. That becomes `ct_scope__tube_hookup` ∈ {TRUE, FALSE}, fully populated. ## Rename map, by action **Renames** — `cable_commodity_code`→`commodity_code__pull`, `termination_commodity_code`→`commodity_code__terminate` (cable/equipment/lighting), `gnd_commodity_code`→`commodity_code__gnd_overlay` (tray), `bid_wbs_install`→`bid_wbs__pull`, `bid_wbs_terminate`→`bid_wbs__terminate`, `wbs_package`→`bid_wbs__install` (instrument), `gland_qty`→`qty__gland`, `term_qty`→`qty__terminate`, `qty_notes`/`note`→`qty_note__<leg>`, `tubing_ft`→`qty__tube_hookup`, `tubing_pack`→`workpack__tube_hookup`, `dataset`→`register`. **Deletions** — proven redundant by the profile: cable `pull_workpack` (≡ `cable_pull_workpack`) and `term_workpack` (≡ `termination_workpack`); grounding `scope_flag` (constant). Note `workpack` ≡ `workpack_normalized` is redundant in conduit/equipment/trench but **genuinely differs** in the other five — both stay. **Splits** — `scope_flag` → `trace_variant` (eht), `discipline_flags` (instrument), `scope_class` (cable, tray), `exception_flags` (equipment), folds into `ct_scope` (trench), dropped (grounding). **Vocabulary fixes** — `uom` uppercase (`equipment` has `ea`×4); `component_type` `TRAY` vs `tray` in the same register; booleans standardize to `TRUE`/`FALSE` (currently `True`/`False`, `yes`, `YES`). **Cable gains `estimating_class` = `cable_type_short`.** That collapses the dual rate authority: one `estimating_class_rates.csv` keyed `(register, estimating_class, leg)`, and `cable/cable_types.csv` reverts to being purely a *spec* table. It also lines up exactly with the `public.estimating_class_rates` table from the DB plan. ## Two things before I write the map **One anomaly to settle first:** `tray` has **8 duplicate tags / 16 rows** on a nominally tag-grain register (e.g. `26T-CTE-3127`×2). That's not the instrument leg-grain pattern. I'd want to know what those are before locking a schema around `tag` as PK. **Mechanics I'd use:** `_data_dictionary/column_map.csv` as the single source of truth `(register, old, new, action)`; `tools/rename_register_columns.py` driven by it, idempotent, `--check` dry-run, backing up per your existing `.pre-<slug>.<ts>.bak` convention; then `tools/check_register_schema.py` as a standing gate (core block present, every suffix in the leg vocab, `ct_scope` never blank, `uom` in-vocab). Eight downstream scripts need updating."
