RUE`/`FALSE` (currently `True`/`False`, `yes`, `YES`). **Cable gains `estimating_class` = `cable_type_short`.** That collapses the dual rate authority: one `estimating_class_rates.csv` keyed `(register, estimating_class, leg)`, and `cable/cable_types.csv` reverts to being purely a *spec* table. It also lines up exactly with the `public.estimating_class_rates` table from the DB plan. ## Two things before I write the map **One anomaly to settle first:** `tray` has **8 duplicate tags / 16 rows** on a nominally tag-grain register (e.g. `26T-CTE-3127`×2). That's not the instrument leg-grain pattern. I'd want to know what those are before locking a schema around `tag` as PK. **Mechanics I'd use:** `_data_dictionary/column_map.csv` as the single source of truth `(register, old, new, action)`; `tools/rename_register_columns.py` driven by it, idempotent, `--check` dry-run, backing up per your existing `.pre-<slug>.<ts>.bak` convention; then `tools/check_register_schema.py` as a standing gate (core block present, every suffix in the leg vocab, `ct_scope` never blank, `uom` in-vocab). Eight downstream scripts need updating."
